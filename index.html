<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caixa Surpresa</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.caixa{
    width:220px;
    height:220px;
    background:linear-gradient(#d49b4d,#8b5a2b);
    border-radius:12px;
    cursor:pointer;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:80px;
    transition:.3s;
    box-shadow:0 0 20px rgba(0,0,0,.4);
}

.caixa:hover{
    transform:scale(1.05);
}

#emoji{
    display:none;
    font-size:180px;
    animation:surgir .5s ease;
}

@keyframes surgir{
    from{
        transform:scale(0);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}
    body{
    background:#111;
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.titulo{
    margin-bottom:10px;
}

.sub{
    margin-bottom:40px;
    color:#bbb;
}

#escolha{
    display:flex;
    gap:25px;
}

.caixa{

  width:140px;
    height:140px;
    font-size:60px;

    background:linear-gradient(#d49b4d,#8b5a2b);

    border-radius:15px;

    display:flex;

    justify-content:center;

    align-items:center;

    cursor:pointer;

    transition:.3s;

}

.caixa:hover{
    transform:scale(1.08);
}

.tremendo{

    animation:tremer .12s infinite;

}

@keyframes tremer{

0%{transform:translateX(-4px);}
50%{transform:translateX(4px);}
100%{transform:translateX(-4px);}

}

#resultado{

    display:none;

    flex-direction:column;

    align-items:center;

}

#imagem{
 width:240px;
    max-width:85vw;
    border-radius:20px;

    opacity:0;

    transform:scale(.3);

    transition:1s;

}

#imagem.mostrar{

    opacity:1;

    transform:scale(1);

}

button{

 margin-top:20px;
    padding:10px 20px;
    font-size:16px;

    border:none;

    border-radius:10px;

    cursor:pointer;

}

#confetes{

    font-size:45px;

    animation:explodir 1s infinite;

    margin-bottom:20px;

}

@keyframes explodir{

0%{

transform:scale(.5);

opacity:0;

}

100%{

transform:scale(1.5);

opacity:1;

}

}
</style>
</head>

<body>

<h1 class="titulo">🎁 Escolha um presente</h1>
<p class="sub">Você só pode escolher um...</p>

<div id="escolha">

<div class="caixa" onclick="abrirPresente(event,1)">
    🎁
</div>

<div class="caixa" onclick="abrirPresente(event,2)">
    🎁
</div>

</div>

<div id="resultado">

    <div id="confetes">🎉✨🎊🎉✨🎊🎉</div>

    <img id="imagem">

    <button onclick="voltar()">
        🔄 Escolher novamente
    </button>

</div>

</body>
    <script>

function abrirPresente(event, numero){

    document.querySelectorAll(".caixa").forEach(c=>{
        c.style.pointerEvents="none";
    });

    const caixa = event.currentTarget;

    caixa.classList.add("tremendo");

    setTimeout(()=>{

        document.getElementById("escolha").style.display="none";

        document.querySelector(".titulo").style.display="none";

        document.querySelector(".sub").style.display="none";

        document.getElementById("resultado").style.display="flex";

        const img = document.getElementById("imagem");

        if(numero == 1){

            img.src="https://preview.redd.it/big-monke-flips-you-off-what-u-do-v0-861gk9gqka0c1.png?auto=webp&s=4ffd6a12783c45e1a56bb7c19a57ead83aaa4f33";

        }else{

            img.src="https://i.pinimg.com/736x/86/09/81/860981f80e99e0205783931def346370.jpg";

        }

        setTimeout(()=>{
            img.classList.add("mostrar");
        },300);

    },1500);

}

function voltar(){
    location.reload();
}

</script>
</html>
